apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-bridge
  labels:
    app: devops-bridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-bridge
  template:
    metadata:
      labels:
        app: devops-bridge
    spec:
      containers:
        - name: devops-bridge
          image: "ghcr.io/<owner>/devops-bridge:latest"
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_ENV
              value: "production"
            - name: SERVICE_PORT
              value: "8000"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
